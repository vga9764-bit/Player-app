<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نادي الرجاء العراقي - دخول اللاعبين</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --accent-blue: #2563eb;
      --accent-light: #60a5fa;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 30px; }

    header {
      background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
      border-bottom: 2px solid var(--accent-blue);
      padding: 20px 15px;
      text-align: center;
    }

    .club-title { font-size: 1.5rem; font-weight: bold; color: #ffffff; }
    .subtitle { font-size: 0.85rem; color: var(--accent-light); margin-top: 4px; }
    .container { max-width: 800px; margin: 0 auto; padding: 15px; }

    /* شاشة تسجيل الدخول */
    .login-box {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      margin: 40px auto;
      max-width: 400px;
    }

    .login-box h3 { margin-bottom: 15px; color: #fff; }
    .login-box input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: #0f172a;
      color: #fff;
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 15px;
      outline: none;
    }

    .login-btn {
      width: 100%;
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; display: none; }

    /* لوحة الإحصائيات (تكون مخفية في البداية) */
    #dashboard { display: none; }

    .player-card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin: 20px 0 10px 0;
      color: var(--accent-light);
      border-right: 4px solid var(--accent-blue);
      padding-right: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }

    .stat-box {
      background-color: var(--card-bg);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      text-align: center;
    }

    .stat-box .number { font-size: 1.6rem; font-weight: bold; color: #ffffff; margin-top: 5px; }
    .stat-box .label { font-size: 0.8rem; color: var(--text-muted); }

    .chart-card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .logout-btn {
      background-color: #dc2626;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="club-title">نادي الرجاء العراقي</div>
    <div class="subtitle">منصة متابعة الإحصائيات والتطور البدني</div>
  </header>

  <div class="container">
    
    <!-- شاشة إدخال رمز الخصوصية -->
    <div class="login-box" id="loginScreen">
      <h3>تسجيل دخول اللاعب</h3>
      <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">أدخل رمزك الخاص (PIN) لرؤية بياناتك</p>
      <input type="password" id="pinInput" placeholder="أدخل الرمز هنا..." maxlength="6">
      <button class="login-btn" onclick="checkPin()">دخول المنصة</button>
      <div class="error-msg" id="errorMsg">الرمز غير صحيح! يرجى التأكد من الكادر التدريبي.</div>
    </div>

    <!-- لوحة البيانات الخصوصية للاعب -->
    <div id="dashboard">
      <div class="player-card">
        <div>
          <h2 id="playerName">اللاعب: -</h2>
          <p id="playerPos" style="color: var(--text-muted); font-size: 0.85rem;">المركز: -</p>
        </div>
        <button class="logout-btn" onclick="logout()">خروج 🚪</button>
      </div>

      <div class="section-title">إحصائياتك في الموسم</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="label">الأهداف</div><div class="number" id="statGoals">0</div></div>
        <div class="stat-box"><div class="label">التمريرات الحاسمة</div><div class="number" id="statAssists">0</div></div>
        <div class="stat-box"><div class="label">دقائق اللعب</div><div class="number" id="statMinutes">0</div></div>
        <div class="stat-box"><div class="label">معدل التقييم</div><div class="number" id="statRating">0.0</div></div>
      </div>

      <div class="section-title">مؤشرات تطورك البدني</div>
      <div class="chart-card"><canvas id="weightChart"></canvas></div>
      <div class="chart-card"><canvas id="staminaChart"></canvas></div>
    </div>

  </div>

  <script>
    // قاعدة بيانات تجريبية (رمز كل لاعب وحسابه الخاص)
    // يمكنك تعديل الأكواد والبيانات بسهولة هنا أو ربطها بـ Google Sheets
    const playersDatabase = {
      "1010": {
        name: "أحمد علي",
        position: "مهاجم",
        goals: 12,
        assists: 5,
        minutes: 780,
        rating: 8.3,
        months: ['شهر 1', 'شهر 2', 'شهر 3', 'شهر 4', 'شهر 5'],
        weight: [74, 73.5, 73, 72.8, 72],
        stamina: [70, 75, 80, 85, 90]
      },
      "2020": {
        name: "حسين جاسم",
        position: "وسط ميدان",
        goals: 6,
        assists: 11,
        minutes: 900,
        rating: 8.7,
        months: ['شهر 1', 'شهر 2', 'شهر 3', 'شهر 4', 'شهر 5'],
        weight: [68, 68, 67.5, 67, 67],
        stamina: [75, 78, 82, 88, 92]
      }
    };

    let weightChartInstance = null;
    let staminaChartInstance = null;

    function checkPin() {
      const pin = document.getElementById('pinInput').value;
      const errorMsg = document.getElementById('errorMsg');

      if (playersDatabase[pin]) {
        errorMsg.style.display = 'none';
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadPlayerData(playersDatabase[pin]);
      } else {
        errorMsg.style.display = 'block';
      }
    }

    function loadPlayerData(player) {
      document.getElementById('playerName').innerText = "اللاعب: " + player.name;
      document.getElementById('playerPos').innerText = "المركز: " + player.position + " | نادي الرجاء العراقي";
      document.getElementById('statGoals').innerText = player.goals;
      document.getElementById('statAssists').innerText = player.assists;
      document.getElementById('statMinutes').innerText = player.minutes;
      document.getElementById('statRating').innerText = player.rating;

      if (weightChartInstance) weightChartInstance.destroy();
      if (staminaChartInstance) staminaChartInstance.destroy();

      weightChartInstance = new Chart(document.getElementById('weightChart'), {
        type: 'line',
        data: {
          labels: player.months,
          datasets: [{
            label: 'تطور الوزن (كغم)',
            data: player.weight,
            borderColor: '#2563eb',
            backgroundColor: 'rgba(37, 99, 235, 0.1)',
            fill: true, tension: 0.3
          }]
        },
        options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
      });

      staminaChartInstance = new Chart(document.getElementById('staminaChart'), {
        type: 'line',
        data: {
          labels: player.months,
          datasets: [{
            label: 'مستوى اللياقة / التحمل البدني',
            data: player.stamina,
            borderColor: '#60a5fa',
            backgroundColor: 'rgba(96, 165, 250, 0.1)',
            fill: true, tension: 0.3
          }]
        },
        options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
      });
    }

    function logout() {
      document.getElementById('pinInput').value = '';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'block';
    }
  </script>
</body>
</html>
